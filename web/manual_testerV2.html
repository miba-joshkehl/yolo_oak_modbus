<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MBUS Vision API - Manual Tester</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-alt: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --accent-soft: #14532d;
      --danger: #f87171;
      --border: #374151;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, system-ui, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .card {
      background: linear-gradient(180deg, var(--panel), #0b1220);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
    }

    h1, h2 {
      margin: 0 0 12px;
      font-weight: 700;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
      align-items: end;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select, button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel-alt);
      color: var(--text);
      font-size: 0.95rem;
    }

    input[type="range"] { padding: 0; }

    button {
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, var(--accent), #16a34a);
      font-weight: 600;
      transition: transform 0.05s ease;
    }
    button:hover { transform: translateY(-1px); }

    .secondary {
      background: #334155;
    }

    .inline-action {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .inline-action input {
      flex: 1;
    }

    .inline-action button {
      width: auto;
      min-width: 120px;
      white-space: nowrap;
    }

    .drop-zone {
      border: 2px dashed #4b5563;
      border-radius: 14px;
      padding: 26px;
      text-align: center;
      color: var(--muted);
      transition: 0.15s ease;
      background: rgba(30, 41, 59, 0.45);
    }

    .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(34, 197, 94, 0.1);
      color: #d1fae5;
    }

    .status {
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 0.9rem;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.35);
    }

    .status.error {
      background: rgba(248, 113, 113, 0.1);
      border-color: rgba(248, 113, 113, 0.35);
      color: #fecaca;
    }

    .results {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    @media (max-width: 820px) {
      .results { grid-template-columns: 1fr; }
    }

    .preview {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #020617;
      max-height: 420px;
      object-fit: contain;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td {
      text-align: left;
      padding: 8px;
      border-bottom: 1px solid #243244;
    }

    .meta { color: var(--muted); font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>MBUS Vision API - Manual Tester</h1>
      <div class="row">
        <div>
          <label for="baseUrl">API Base URL</label>
          <input id="baseUrl" value="http://127.0.0.1:8000" />
        </div>
        <div>
          <button id="refreshModel" class="secondary">Refresh Model Info</button>
        </div>
      </div>
      <p class="meta" id="modelInfo">Model info: not loaded.</p>
    </div>

    <div class="card">
      <h2>Load / Switch Model</h2>
      <div class="row">
        <div>
          <label for="modelSize">Model size</label>
          <select id="modelSize">
            <option value="medium">medium</option>
            <option value="large">large</option>
          </select>
        </div>
        <div>
          <label for="weightsPath">Weights path (optional)</label>
          <div class="inline-action">
            <input id="weightsPath" placeholder="C:\\models\\weights.pt" />
            <button id="browseWeightsBtn" type="button" class="secondary">Browse .pt</button>
          </div>
          <input id="weightsFileInput" type="file" accept=".pt" hidden />
        </div>
        <div>
          <label for="deviceMode">Device</label>
          <select id="deviceMode">
            <option value="auto">auto</option>
            <option value="gpu">gpu</option>
            <option value="cpu">cpu</option>
          </select>
        </div>
        <div>
          <button id="loadModelBtn">Load Model</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Inference</h2>
      <div class="row" style="margin-bottom: 10px;">
        <div>
          <label for="threshold">Confidence threshold: <span id="thresholdValue">0.50</span></label>
          <input id="threshold" type="range" min="0" max="1" step="0.01" value="0.5" />
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="inferBtn">Run Inference</button>
        </div>
      </div>

      <div id="dropZone" class="drop-zone">
        Drag & drop an image here, or <strong>click to choose</strong>
      </div>
      <input id="fileInput" type="file" accept="image/*" hidden />
      <p class="meta" id="selectedFile">No image selected.</p>
    </div>

    <div id="status" class="status">Ready.</div>

    <div class="card results">
      <div>
        <h2>Input Image</h2>
        <img id="inputPreview" class="preview" alt="Input preview" />
      </div>
      <div>
        <h2>Annotated Result</h2>
        <img id="outputPreview" class="preview" alt="Annotated preview" />
      </div>
    </div>

    <div class="card">
      <h2>Detections</h2>
      <p class="meta" id="inferenceMeta">No inference run yet.</p>
      <table>
        <thead>
          <tr><th>Class</th><th>Confidence</th><th>Box (x1,y1,x2,y2)</th></tr>
        </thead>
        <tbody id="detectionsBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const state = { file: null };

    const els = {
      baseUrl: document.getElementById('baseUrl'),
      modelInfo: document.getElementById('modelInfo'),
      modelSize: document.getElementById('modelSize'),
      weightsPath: document.getElementById('weightsPath'),
      deviceMode: document.getElementById('deviceMode'),
      threshold: document.getElementById('threshold'),
      thresholdValue: document.getElementById('thresholdValue'),
      selectedFile: document.getElementById('selectedFile'),
      fileInput: document.getElementById('fileInput'),
      dropZone: document.getElementById('dropZone'),
      status: document.getElementById('status'),
      inputPreview: document.getElementById('inputPreview'),
      outputPreview: document.getElementById('outputPreview'),
      detectionsBody: document.getElementById('detectionsBody'),
      inferenceMeta: document.getElementById('inferenceMeta'),
      refreshModel: document.getElementById('refreshModel'),
      loadModelBtn: document.getElementById('loadModelBtn'),
      inferBtn: document.getElementById('inferBtn')
    };

    els.browseWeightsBtn = document.getElementById('browseWeightsBtn');
    els.weightsFileInput = document.getElementById('weightsFileInput');

    const normalizeBaseUrl = () => els.baseUrl.value.trim().replace(/\/+$/, '');

    function setStatus(message, isError = false) {
      els.status.textContent = message;
      els.status.classList.toggle('error', isError);
    }

    function setSelectedFile(file) {
      state.file = file;
      if (!file) {
        els.selectedFile.textContent = 'No image selected.';
        els.inputPreview.removeAttribute('src');
        return;
      }
      els.selectedFile.textContent = `Selected: ${file.name} (${Math.round(file.size / 1024)} KB)`;
      const objectUrl = URL.createObjectURL(file);
      els.inputPreview.src = objectUrl;
    }

    function renderDetections(items) {
      els.detectionsBody.innerHTML = '';
      if (!items || !items.length) {
        els.detectionsBody.innerHTML = '<tr><td colspan="3">No detections.</td></tr>';
        return;
      }
      for (const d of items) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${d.class_name}</td>
          <td>${(d.confidence * 100).toFixed(1)}%</td>
          <td>${d.x1.toFixed(0)}, ${d.y1.toFixed(0)}, ${d.x2.toFixed(0)}, ${d.y2.toFixed(0)}</td>
        `;
        els.detectionsBody.appendChild(tr);
      }
    }

    async function api(path, init = {}) {
      const response = await fetch(`${normalizeBaseUrl()}${path}`, init);
      const text = await response.text();
      let body;
      try { body = text ? JSON.parse(text) : {}; } catch { body = { detail: text }; }
      if (!response.ok) throw new Error(body.detail || `HTTP ${response.status}`);
      return body;
    }

    async function refreshModel() {
      try {
        const model = await api('/model');
        els.modelInfo.textContent = `Model: ${model.model_size} | device=${model.torch_device} | classes=${model.class_count} | loaded=${model.loaded_at_utc}`;
      } catch (err) {
        els.modelInfo.textContent = `Model info unavailable: ${err.message}`;
      }
    }

    async function loadModel() {
      setStatus('Loading model...');
      try {
        const payload = {
          model_size: els.modelSize.value,
          weights_path: els.weightsPath.value.trim() || null,
          optimize_for_inference: true,
          device_mode: els.deviceMode.value
        };
        const model = await api('/model/load', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        setStatus(`Model loaded: ${model.model_size} on ${model.torch_device}`);
        await refreshModel();
      } catch (err) {
        setStatus(`Model load failed: ${err.message}`, true);
      }
    }

    function chooseWeightsFile() {
      els.weightsFileInput.value = '';
      els.weightsFileInput.click();
    }

    function resolveSelectedWeightsPath(file, inputValue) {
      const directPath = typeof file?.path === 'string' ? file.path.trim() : '';
      if (directPath) return directPath;

      const valuePath = (inputValue || '').trim();
      if (valuePath && !valuePath.includes('fakepath')) return valuePath;
      return '';
    }

    function onWeightsFilePicked() {
      const file = els.weightsFileInput.files?.[0] || null;
      if (!file) return;

      const resolvedPath = resolveSelectedWeightsPath(file, els.weightsFileInput.value);
      if (!resolvedPath) {
        setStatus('Could not read an absolute file path from the picker in this runtime. Please paste the full path manually.', true);
        return;
      }

      els.weightsPath.value = resolvedPath;
      setStatus(`Selected weights path: ${resolvedPath}`);
    }

    async function runInference() {
      if (!state.file) {
        setStatus('Please select an image first.', true);
        return;
      }

      setStatus('Running inference...');

      try {
        const formData = new FormData();
        formData.append('file', state.file, state.file.name);
        formData.append('threshold', els.threshold.value);
        formData.append('save_annotated_image', 'false');
        formData.append('return_image_base64', 'true');

        const result = await api('/infer/upload', { method: 'POST', body: formData });

        if (result.annotated_image_base64) {
          els.outputPreview.src = `data:image/png;base64,${result.annotated_image_base64}`;
        } else {
          els.outputPreview.removeAttribute('src');
        }

        els.inferenceMeta.textContent = `Detections: ${result.detections_count} | ${result.inference_time_ms} ms | device=${result.torch_device}`;
        renderDetections(result.detections);
        setStatus('Inference complete.');
      } catch (err) {
        setStatus(`Inference failed: ${err.message}`, true);
      }
    }

    els.threshold.addEventListener('input', () => {
      els.thresholdValue.textContent = Number(els.threshold.value).toFixed(2);
    });

    els.dropZone.addEventListener('click', () => els.fileInput.click());
    els.fileInput.addEventListener('change', () => setSelectedFile(els.fileInput.files[0] || null));

    ['dragenter', 'dragover'].forEach(evt => {
      els.dropZone.addEventListener(evt, e => {
        e.preventDefault();
        e.stopPropagation();
        els.dropZone.classList.add('dragover');
      });
    });

    ['dragleave', 'drop'].forEach(evt => {
      els.dropZone.addEventListener(evt, e => {
        e.preventDefault();
        e.stopPropagation();
        els.dropZone.classList.remove('dragover');
      });
    });

    els.dropZone.addEventListener('drop', e => {
      const files = e.dataTransfer?.files;
      if (files && files[0]) setSelectedFile(files[0]);
    });

    els.refreshModel.addEventListener('click', refreshModel);
    els.loadModelBtn.addEventListener('click', loadModel);
    els.inferBtn.addEventListener('click', runInference);
    els.browseWeightsBtn.addEventListener('click', chooseWeightsFile);
    els.weightsFileInput.addEventListener('change', onWeightsFilePicked);

    refreshModel();
  </script>
</body>
</html>
